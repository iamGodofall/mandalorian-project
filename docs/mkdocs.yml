site_name: Mandalorian Project Docs
site_url: https://iamgodofall.github.io/mandalorian-project/
site_description: Sovereign Mobile Computing — Betrayal-Resistant Architecture on seL4
site_author: Themba Mpehle

repo_name: iamGodofall/mandalorian-project
repo_url: https://github.com/iamGodofall/mandalorian-project

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.action.view

plugins:
  - search
  - mermaid2:
      version: 9

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilites
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.mark

nav:
  - Home: index.md
  - Architecture:
    - Overview: architecture/overview.md
    - Mandalorian Gate: architecture/gate.md
    - Helm Attestation: architecture/helm.md
    - BeskarVault: architecture/vault.md
    - BeskarLink: architecture/link.md
    - Shield Ledger: architecture/ledger.md
  - Security:
    - Threat Model: security/threat-model.md
    - Security Audit: security/audit.md
    - Critical Fixes: security/critical-fixes.md
  - API Reference:
    - Overview: api/README.md
  - Project Docs:
    - README: README.md
    - Roadmap: TODO.md
    - Contributing: CONTRIBUTING.md
  - Resources:
    - FOSDEM 2026 Talk: fosdem2026_talk_outline.md
    - Full Structure: full_project_structure.md
