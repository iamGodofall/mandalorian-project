name: Mandalorian Project CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  RISCV_TOOLCHAIN_VERSION: "13.2.0"
  SEL4_REF: "develop"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Unit Tests (no seL4 required)
  # ─────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc \
            make \
            cmake \
            ninja-build \
            cppcheck \
            clang-format \
            clang-tidy

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Run mandalorian_gate tests
        run: |
          cd tests/comprehensive
          ./run_tests.sh --quiet || true
          cat tests/comprehensive/TEST_RESULTS.txt 2>/dev/null || echo "No test results file"

      - name: Static analysis (cppcheck)
        run: |
          mkdir -p analysis
          cppcheck --enable=all --std=c99 --platform=unix64 \
            -Imandalorian/include \
            -Ihelm/include \
            -Ibeskarcore/include \
            --suppress=missingIncludeSystem \
            --inline-suppr \
            mandalorian/ helm/ beskarcore/ 2>&1 | tee analysis/cppcheck.txt || true

      - name: Code formatting check
        run: |
          which clang-format && \
          find mandalorian/ helm/ beskarcore/ -name "*.c" -o -name "*.h" | \
          while read f; do clang-format --dry-run "$f" 2>&1 | grep -q "format okay" || echo "MISFORMATTED: $f"; done || \
          echo "clang-format not available — skipping"

      - name: Upload analysis artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis
          path: analysis/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Comprehensive Test Suite
  # ─────────────────────────────────────────────────────────────────────────────
  comprehensive-tests:
    name: Comprehensive Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run full test suite
        env:
          CC: gcc
        run: |
          cd tests/comprehensive
          chmod +x run_tests.sh
          ./run_tests.sh
          echo "--- Test Summary ---"
          cat TEST_RESULTS.txt 2>/dev/null || echo "No summary available"
          echo "--- Coverage ---"
          cat COVERAGE.txt 2>/dev/null || echo "No coverage available"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/comprehensive/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Build Verification (simulated — no seL4 in CI)
  # ─────────────────────────────────────────────────────────────────────────────
  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install RISC-V toolchain
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-riscv64-unknown-elf || \
          echo "RISC-V toolchain not available in CI — using simulation mode"

      - name: Verify Makefile targets
        run: |
          cd beskarcore
          make deps || echo "deps check completed"
          make simulate 2>&1 | tail -20 || echo "Simulated build attempted"

      - name: Verify Helm compilation
        run: |
          cd helm
          make clean && make all 2>&1 | tail -20

      - name: Verify Mandalorian core
        run: |
          cd mandalorian
          make clean && make all 2>&1 | tail -20

      - name: Verify stub files
        run: |
          echo "Checking all required stub files..."
          for stub in \
            mandalorian/core/stubs/executor_stub.c \
            mandalorian/core/stubs/logging_stub.c \
            mandalorian/core/stubs/time_stub.c \
            mandalorian/core/stubs/clock_stub.c \
            mandalorian/core/stubs/gate_stub.c \
            mandalorian/core/stubs/policy_stub.c; do
            if [ -f "$stub" ]; then
              echo "  ✓ $stub"
            else
              echo "  ✗ MISSING: $stub"
              exit 1
            fi
          done

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Security Audit
  # ─────────────────────────────────────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run security audit
        run: |
          sudo apt-get install -y cppcheck
          mkdir -p analysis/security
          # Critical security checks
          cppcheck --enable=warning,performance,information,portability \
            --std=c99 --platform=unix64 \
            -Imandalorian/include \
            -Ihelm/include \
            -Ibeskarcore/include \
            --suppress=missingIncludeSystem \
            --check-config \
            mandalorian/ helm/ beskarcore/ \
            2>&1 | tee analysis/security/audit.txt || true
          echo "--- Critical Issues ---"
          grep -i "error" analysis/security/audit.txt | head -20 || echo "No critical issues"

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: analysis/security/
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 5: Cross-platform build (Windows + Linux)
  # ─────────────────────────────────────────────────────────────────────────────
  cross-platform:
    name: Cross-Platform Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            cc: gcc
            shell: bash
          - os: windows-latest
            cc: cl
            shell: powershell

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC (Windows)
        if: matrix.os == 'windows-latest'
        uses: microsoft/setup-msvc@v3
        with:
          arch: x64

      - name: Build on ${{ matrix.os }}
        shell: ${{ matrix.shell }}
        run: |
          echo "Building on ${{ matrix.os }} with ${{ matrix.cc }}"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cd beskarcore && cmake -B build -G "Visual Studio 17 2022" -A x64
            cmake --build build --config Release
          else
            cd beskarcore && cmake -B build -G Ninja && cmake --build build
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 6: Documentation Check
  # ─────────────────────────────────────────────────────────────────────────────
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required docs exist
        run: |
          echo "Checking required documentation..."
          for doc in README.md TODO.md PRE_UPLOAD_CHECKLIST.md CONTRIBUTING.md; do
            if [ -f "$doc" ]; then
              echo "  ✓ $doc ($(wc -l < $doc) lines)"
            else
              echo "  ✗ MISSING: $doc"
            fi
          done

      - name: Verify architecture consistency
        run: |
          echo "Verifying architecture docs..."
          for doc in \
            "docs/architecture/overview.md" \
            "docs/architecture/gate.md" \
            "docs/architecture/helm.md" \
            "docs/architecture/vault.md" \
            "docs/architecture/link.md" \
            "docs/architecture/ledger.md"; do
            if [ -f "$doc" ]; then
              echo "  ✓ $doc"
            else
              echo "  ✗ MISSING: $doc"
              exit 1
            fi
          done

      - name: Build mkdocs site
        run: |
          pip install mkdocs-material
          mkdocs build --strict --verbose
        working-directory: .

      - name: Verify site output
        run: |
          if [ -d "site" ]; then
            echo "  ✓ site/ built ($(find site -type f | wc -l) files)"
          else
            echo "  ✗ site/ directory not found"
            exit 1
          fi
